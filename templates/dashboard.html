<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CISO Dashboard</title>
</head>
<!-- AI section of the web page's front end -->
<body>
    <h1>CISO Dashboard</h1>
<!-- <div> is a container that groups items together -->
    <div>
        <label for="question">Ask your AI Advisor:</label><br>
        <input type="text" id="question"  style="width: 200px;">
        <button onclick="sendQuestion()">Ask</button>
    </div>
<!-- AI response section -->
    <div id="responseArea">
        <p><strong>Response:</strong></p>
        <p id="responseText">AI's Response:</p>
        <button onclick="copyresponsetoTask()">Save Response to Task List</button>
    </div>

<!-- To do List section -->
    <hr>
    <h2>Task List</h2>
    <div>
        <textarea id="taskText" rows="5" cols="50" placeholder="Enter Tasks here..."></textarea><br>
        <button onclick="saveTask()">Save Tasks</button>
    </div>

<!-- Budget widget section -->
    <hr>
    <div id="budgetWidget">
    <h3>Budget Overview</h3>

    <div>
        <label>Total Budget: €</label>
        <input type="number" id="totalInput" value="">
        <button onclick="editBudget()">Save Budget</button>
    </div>

    <div>
        <label>Spent: €</label>
        <input type="number" id="spentInput" value="">
    </div>

    <p>Remaining: €<span id="remainingBudget">0</span></p>

    <button onclick="refreshBudget()">Reload</button>
</div>
<hr>


    <script>
        function sendQuestion() {
            let question = document.getElementById('question').value;

            if (question.trim() === "") {
                document.getElementById('responseText').innerText = "Ask a question:";
                return;
            }

            document.getElementById('responseText').innerText = "Loading...";

            fetch('/ask', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question })
            })
            .then(response => response.json())
            .then(data => {
                // Displays the AI's response
                if (data.Response) {
                    document.getElementById('responseText').innerText = data.Response;
                } else if (data.error) {
                    document.getElementById('responseText').innerText = "Error: " + data.error;
                } else {
                    document.getElementById('responseText').innerText = "Unexpected response.";
                }
            })
        }
        // copy AI's response to task list section:
        function copyresponsetoTask() {
        const responseElement = document.getElementById('responseText');
        const aiResponse = responseElement.innerText;
        const taskTextArea = document.getElementById('taskText');
        taskTextArea.value = aiResponse;
        }

        function refreshBudget() {
            fetch('/assets/budget')
                .then(response => response.json())
                .then(data => {
                    const budget = data.data;
                    document.getElementById('totalBudget').innerText = budget.total;
                    document.getElementById('spentBudget').innerText = budget.spent;
                    document.getElementById('remainingBudget').innerText = budget.remaining;
                    document.getElementById('totalInput').value = budget.total;
                    document.getElementById('spentInput').value = budget.spent;
                });
            }

        function editBudget() {
            let newTotal = document.getElementById('totalInput').value;
            let newSpent = document.getElementById('spentInput').value;

            fetch('/edit/budget', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                Total: newTotal, Spent: newSpent
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                } else if (data.budget){
                    document.getElementById('remainingBudget').innerText = data.budget.remaining;
                    document.getElementById('totalInput').value = data.budget.total;
                    document.getElementById('spentInput').value = data.budget.spent;

                }
            });
        }
    //reloads budget on page refresh
    window.onload = function() {
        refreshBudget();
    };

        function loadTask() {
            fetch('/todolist')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('taskText').value = data.todolist;
                })
            .catch(error => console.error('Error loading list:', error));
}
        function saveTask() {
            const taskText = document.getElementById('taskText').value;
            fetch('/todolist', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ todolist: taskText })
                })
            .then(response => {
                if (response.ok) {
                    alert('Tasks saved');
                } else {
                alert('Failed to save tasks');
                }
            })
            .catch(error => console.error('Error saving tasks:', error));
            } //confirms to user that tasks have been saved

    window.addEventListener('load', function() {
        loadTask();
    });
    window.onload = function() {
        loadTask();
    }; //when page is refreshed, reloads tasks entered previously
    </script>
</body>
</html>
